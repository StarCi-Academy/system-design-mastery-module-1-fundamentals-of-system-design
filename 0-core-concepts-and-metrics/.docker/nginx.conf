# Cấu hình Nginx Load Balancer — Round-robin phân tải qua nhiều API Node
# (EN: Nginx Load Balancer config — Round-robin distributes load across multiple API Nodes)
#
# Nginx sẽ tự resolve tên service "status-service" trong Docker network,
# tìm tất cả container đang chạy của service đó và round-robin traffic
# (EN: Nginx resolves the "status-service" service name in Docker network,
# finds all running containers of that service and round-robins traffic)

server {
    # Nginx lắng nghe trên port 80 bên trong container, được map ra 8080 ở host
    # (EN: Nginx listens on port 80 inside container, mapped to 8080 on host)
    listen 80;

    # Sử dụng Docker DNS resolver (127.0.0.11) để cập nhật IP liên tục
    # (EN: Use Docker DNS resolver to dynamically update IPs)
    resolver 127.0.0.11 valid=1s;

    location / {
        # Đặt tên service vào biến để ép Nginx phân giải DNS ở mỗi request
        # (EN: Put service name in a variable to force Nginx to resolve DNS dynamically)
        set $backend "http://status-service:3000";
        proxy_pass $backend;

        # Giữ nguyên header gốc từ client (EN: preserve original client headers)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
