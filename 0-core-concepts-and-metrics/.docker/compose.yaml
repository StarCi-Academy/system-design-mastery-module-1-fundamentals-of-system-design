# Kiến trúc: Nginx đóng vai trò là cổng giao tiếp duy nhất (Single Entry Point),
# điều hướng traffic xuống các worker (status-service) theo thuật toán Round-robin.
# (EN: Architecture: Nginx acts as the Single Entry Point,
# routing traffic to workers (status-service) using Round-robin algorithm.)
#
# Thư mục làm việc: 0-core-concepts-and-metrics/.docker
#
# Lệnh khởi chạy stack (Scale lên 5 node):
# (EN: Start stack command (Scale to 5 nodes):)
# docker compose up -d --scale status-service=5
#
# Lệnh xem log:
# (EN: View logs command:)
# docker compose logs -f
#
# Lệnh dọn dẹp:
# (EN: Cleanup command:)
# docker compose down -v

name: 0-core-concepts-and-metrics

services:
  # Nginx Load Balancer — Điều hướng request.
  # (EN: Nginx Load Balancer — Routes requests.)
  nginx:
    image: nginx:alpine
    container_name: starci-nginx-lb
    ports:
      # Ánh xạ cổng host 8080 → container 80 (HTTP API).
      # (EN: Map host port 8080 → container 80 (HTTP API).)
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - 0-core-concepts-and-metrics

  # NestJS Status Service — API Node xử lý luồng công việc.
  # (EN: NestJS Status Service — API Node handling workflow.)
  status-service:
    image: starciacademy/core-concepts-and-metrics-status-service:latest
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - 0-core-concepts-and-metrics

networks:
  0-core-concepts-and-metrics:
    name: 0-core-concepts-and-metrics
