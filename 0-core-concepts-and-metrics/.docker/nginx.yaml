# Docker Compose cho Nginx Load Balancer (Orchestrator Service)
# (EN: Docker Compose for Nginx Load Balancer - Orchestrator Service)
#
# Kiến trúc: Nginx đóng vai trò là cổng giao tiếp duy nhất (Single Entry Point),
# điều hướng traffic xuống các worker (status-service) theo thuật toán Round-robin.
# (EN: Architecture: Nginx acts as the Single Entry Point,
# routing traffic to workers (status-service) using Round-robin algorithm.)
#
# Run command:
# docker compose -f .docker/nginx.yaml up -d --build

services:
  # === Nginx Load Balancer ===
  nginx:
    image: nginx:alpine
    container_name: starci-nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - starci-network

networks:
  starci-network:
    external: true
    name: starci-network
