# Docker Compose cho NestJS Status Service (Worker Service)
# (EN: Docker Compose for NestJS Status Service - Worker Service)
#
# Kiến trúc: Mỗi container chạy một instance của NestJS (Cloud Image),
# trả về hostname để xác minh Round-robin.
# (EN: Architecture: Each container runs a NestJS instance (Cloud Image),
# returning hostname to verify Round-robin.)
#
# Run command:
# docker compose -f .docker/status-service.yaml up -d
#
# Scale command (Scale lên 5 node để test phân tải):
# docker compose -f .docker/status-service.yaml up -d --scale status-service=5

services:
  # === NestJS Status Service ===
  status-service:
    image: starciacademy/core-concepts-and-metrics-status-service:latest
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - starci-network

networks:
  starci-network:
    external: true
    name: starci-network
