# Docker Compose cho Scaling Service (Worker)
# (EN: Docker Compose for Scaling Service - Worker)
#
# Demo Vertical Scaling (Mở rộng dọc):
# Thay đổi cpus và memory trong phần deploy để thấy sự khác biệt về hiệu năng.
# (EN: Demo Vertical Scaling: Change cpus and memory in deploy section to see performance diff.)
#
# Demo Horizontal Scaling (Mở rộng ngang):
# Sử dụng tham số --scale khi chạy command.
# (EN: Demo Horizontal Scaling: Use --scale parameter when running command.)
#
# Run command:
# docker compose -f .docker/scaling-service.yaml up -d
#
# Scale command:
# docker compose -f .docker/scaling-service.yaml up -d --scale scaling-service=5

services:
  # === Scaling Service ===
  scaling-service:
    image: starciacademy/scaling-strategies-scaling-service:latest
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - starci-network
    deploy:
      resources:
        limits:
          cpus: '0.5' # Giới hạn 0.5 CPU (Vertical Scaling demo)
          memory: 256M # Giới hạn 256MB RAM

networks:
  starci-network:
    external: true
    name: starci-network
