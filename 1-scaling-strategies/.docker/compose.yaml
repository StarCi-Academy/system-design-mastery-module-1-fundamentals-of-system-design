# Demo Vertical Scaling (Mở rộng dọc):
# Thay đổi cpus và memory trong phần deploy để thấy sự khác biệt về hiệu năng.
# (EN: Demo Vertical Scaling: Change cpus and memory in deploy section to see performance diff.)
#
# Thư mục làm việc: 1-scaling-strategies/.docker
#
# Lệnh khởi chạy stack (Scale lên 5 node):
# (EN: Start stack command (Scale to 5 nodes):)
# docker compose up -d --scale scaling-service=5
#
# Lệnh xem log:
# (EN: View logs command:)
# docker compose logs -f
#
# Lệnh dọn dẹp:
# (EN: Cleanup command:)
# docker compose down -v

name: 1-scaling-strategies

services:
  # Nginx Load Balancer — Điều hướng request.
  # (EN: Nginx Load Balancer — Routes requests.)
  nginx:
    image: nginx:alpine
    container_name: starci-scaling-lb
    ports:
      # Ánh xạ cổng host 8081 → container 80 (HTTP API).
      # (EN: Map host port 8081 → container 80 (HTTP API).)
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - 1-scaling-strategies

  # Scaling Service — API Node với cấu hình giới hạn tài nguyên.
  # (EN: Scaling Service — API Node with resource limits.)
  scaling-service:
    image: starciacademy/scaling-strategies-scaling-service:latest
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - 1-scaling-strategies
    deploy:
      resources:
        limits:
          cpus: '0.5' # Giới hạn 0.5 CPU (Vertical Scaling demo)
          memory: 256M # Giới hạn 256MB RAM

networks:
  1-scaling-strategies:
    name: 1-scaling-strategies
